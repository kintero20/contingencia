<!DOCTYPE html>
<html lang="es">

<head>
  <meta name="Elaborado por Harold Quintero">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SBEUP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    :root {
      --blue: #1a73e8;
      --dark: #1f2937;
      --gray: #6b7280;
      --light: #f3f4f6;
      --white: #fff;
      --red: #ef4444;
      --green: #22c55e;
      --orange: #f59e0b;
      --shadow: 0 2px 8px rgba(0, 0, 0, .1);
      --radius: 12px
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light);
      color: var(--dark);
      padding-bottom: 70px;
      min-height: 100vh
    }

    .hide {
      display: none !important
    }

    .page {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto
    }

    .header {
      background: var(--blue);
      color: var(--white);
      padding: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600
    }

    .header .sub {
      font-size: 20px;
      opacity: .8
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow)
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      margin-bottom: 4px;
      margin-top: 12px
    }

    label:first-child {
      margin-top: 0
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border .2s;
      background: var(--white);
      font-family: inherit
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue)
    }

    textarea {
      resize: vertical;
      min-height: 60px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s;
      width: 100%;
      text-decoration: none
    }

    .btn:active {
      opacity: .7
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white)
    }

    .btn-success {
      background: var(--green);
      color: var(--white)
    }

    .btn-danger {
      background: var(--red);
      color: var(--white)
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--blue);
      color: var(--blue)
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
      width: auto
    }

    .btn-icon {
      width: auto;
      padding: 10px;
      border-radius: 50%
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap
    }

    .camera-box {
      width: 100%;
      height: 200px;
      background: #e5e7eb;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      margin-top: 8px;
      cursor: pointer
    }

    .camera-box img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .camera-box .placeholder {
      text-align: center;
      color: var(--gray);
      font-size: 14px
    }

    .camera-box .placeholder svg {
      width: 40px;
      height: 40px;
      margin-bottom: 8px;
      opacity: .5
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      display: flex;
      border-top: 1px solid #e5e7eb;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom)
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      cursor: pointer;
      color: var(--gray);
      font-size: 20px;
      transition: color .2s;
      border: none;
      background: none;
      font-family: inherit
    }

    .nav-item.active {
      color: var(--blue)
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      margin-bottom: 2px
    }

    .nav-item span {
      line-height: 1.2
    }

    .result-item {
      padding: 12px 0;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer
    }

    .result-item:last-child {
      border-bottom: none
    }

    .result-item:active {
      background: #f9fafb
    }

    .result-name {
      font-size: 16px;
      font-weight: 500
    }

    .result-cedula {
      font-size: 13px;
      color: var(--gray)
    }

    .result-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500
    }

    .status-estable {
      background: #dcfce7;
      color: #166534
    }

    .status-lesionado {
      background: #fee2e2;
      color: #991b1b
    }

    .status-critico {
      background: #fef3c7;
      color: #92400e
    }

    .status-fallecido {
      background: #f3f4f6;
      color: #374151
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500
    }

    .badge-blue {
      background: #dbeafe;
      color: #1e40af
    }

    .badge-green {
      background: #dcfce7;
      color: #166534
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px
    }

    .stat-card {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      background: var(--light)
    }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--blue)
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray)
    }

    .similarity {
      font-size: 12px;
      color: var(--blue);
      font-weight: 500
    }

    .foto-thumb {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
      background: #e5e7eb
    }

    .detail-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6
    }

    .detail-label {
      width: 100px;
      font-size: 13px;
      color: var(--gray);
      flex-shrink: 0
    }

    .detail-value {
      font-size: 14px;
      font-weight: 500
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 200;
      animation: fadeIn .3s;
      max-width: 90%
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0)
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gray)
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-bottom: 8px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @media(prefers-color-scheme:light) {
      :root {
        --dark: #f3f4f6;
        --gray: #9ca3af;
        --light: #111827;
        --white: #1f2937;
        --shadow: 0 2px 8px rgba(0, 0, 0, .3)
      }

      .card {
        background: #1f2937
      }

      .stat-card {
        background: #111827
      }

      .header {
        background: #1e40af
      }

      .result-item {
        border-color: #374151
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <h1>SBEUP</h1>
      <div class="sub">Sistema Biométrico de Emergencia</div>
    </div>
  </div>

  <div id="page-home" class="page">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">-</div>
        <div class="stat-label">Registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-hoy">-</div>
        <div class="stat-label">Hoy</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Últimos registros</div>
      <div id="recent-list">
        <div class="loading">
          <div class="spinner"></div>
          <div>Cargando...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-register" class="page hide">
    <div class="card">
      <div class="card-title">Datos personales</div>
      <label>Cédula</label>
      <input id="reg-cedula" placeholder="V12345678">
      <label>Nombre</label>
      <input id="reg-nombre" placeholder="Nombre">
      <label>Apellido</label>
      <input id="reg-apellido" placeholder="Apellido">
      <label>Fecha de nacimiento</label>
      <input id="reg-fecnac" type="date">
    </div>
    <div class="card">
      <div class="card-title">Foto</div>
      <div class="camera-box" id="camera-box" onclick="document.getElementById('foto-input').click()">
        <div class="placeholder" id="camera-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <div>Tocar para tomar foto</div>
        </div>
        <img id="camera-preview" class="hide" style="width:100%;height:100%;object-fit:cover">
      </div>
      <input id="foto-input" type="file" accept="image/*" capture="environment" class="hide"
        onchange="previewFoto(event)">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('foto-input').click()"
        style="margin-top:8px;width:auto">Elegir foto</button>
    </div>
    <div class="card">
      <div class="card-title">Situación</div>
      <label>Estado de salud</label>
      <select id="reg-salud">
        <option value="">Seleccionar...</option>
        <option value="estable">Estable</option>
        <option value="lesionado">Lesionado</option>
        <option value="critico">Crítico</option>
        <option value="fallecido">Fallecido</option>
      </select>
      <label>Ubicación actual</label>
      <div style="display:flex;gap:8px">
        <input id="reg-ubicacion" placeholder="Ej: Refugio Los Chorros" style="flex:1">
        <button class="btn btn-outline btn-sm btn-icon" onclick="getGPS()" title="GPS a UTM">📍</button>
      </div>
      <label>UTM Este (X)</label>
      <input id="reg-utmeste" type="number" step="any" placeholder="Ej: 289540">
      <label>UTM Norte (Y)</label>
      <input id="reg-utmnorte" type="number" step="any" placeholder="Ej: 1162000">
      <label>Zona UTM</label>
      <select id="reg-zona">
        <option value="">Seleccionar...</option>
        <option value="18">18</option>
        <option value="19">19 (Caracas)</option>
        <option value="20">20 (Oriente)</option>
        <option value="21">21</option>
      </select>
      <label>Hemisferio</label>
      <select id="reg-hemisferio">
        <option value="">Seleccionar...</option>
        <option value="N">Norte</option>
        <option value="S">Sur</option>
      </select>
      <label>Observaciones médicas</label>
      <textarea id="reg-obs" placeholder="Alergias, condiciones preexistentes, etc."></textarea>
      <label>Registrado por</label>
      <input id="reg-por" placeholder="Cédula o código del brigadista">
    </div>
    <button class="btn btn-primary" onclick="registrar()">Registrar persona</button>
  </div>

  <div id="page-search" class="page hide">
    <div class="card">
      <div class="card-title">Buscar por cédula</div>
      <div style="display:flex;gap:8px">
        <input id="search-cedula" placeholder="V12345678" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="buscarCedula()" style="width:auto">Buscar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Buscar por foto (reconocimiento facial)</div>
      <div class="camera-box" onclick="document.getElementById('face-input').click()" style="height:160px">
        <div id="face-placeholder" class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <div>Foto para búsqueda facial</div>
        </div>
        <img id="face-preview" class="hide" style="width:100%;height:100%;object-fit:cover">
      </div>
      <input id="face-input" type="file" accept="image/*" capture="environment" class="hide"
        onchange="previewFace(event)">
      <button class="btn btn-primary" onclick="buscarFacial()" style="margin-top:8px">Buscar por rostro</button>
    </div>
    <div id="search-results" class="hide">
      <div class="card">
        <div class="card-title">Resultados</div>
        <div id="results-list"></div>
      </div>
    </div>
  </div>

  <div id="page-detail" class="page hide">
    <button class="btn btn-outline btn-sm" onclick="volver()" style="width:auto;margin-bottom:12px">← Volver</button>
    <div id="detail-content"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Inicio</span>
    </button>
    <button class="nav-item" data-page="register" onclick="showPage('register')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <span>Registrar</span>
    </button>
    <button class="nav-item" data-page="search" onclick="showPage('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <span>Buscar</span>
    </button>
  </nav>

  <script>
    const API = window.location.origin;
    let fotoFile = null;
    let faceFile = null;
    let lastView = [];

    function $(id) { return document.getElementById(id) }

    function toast(msg) {
      const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
      document.body.appendChild(t); setTimeout(() => t.remove(), 3000)
    }

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body instanceof FormData) { opts.body = body } else if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body) }
      const r = await fetch(API + path, opts);
      if (!r.ok) { const e = await r.text(); throw new Error(e || `HTTP ${r.status}`) }
      return r.status === 204 ? null : r.json()
    }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hide'));
      document.getElementById('page-' + name).classList.remove('hide');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === name));
      lastView = [name];
      if (name === 'home') cargarHome()
    }

    function previewFoto(e) {
      const f = e.target.files[0]; if (!f) return;
      fotoFile = f; const r = new FileReader();
      r.onload = function () { const img = $('camera-preview'); img.src = r.result; img.classList.remove('hide'); $('camera-placeholder').classList.add('hide') };
      r.readAsDataURL(f)
    }

    function previewFace(e) {
      const f = e.target.files[0]; if (!f) return;
      faceFile = f; const r = new FileReader();
      r.onload = function () { const img = $('face-preview'); img.src = r.result; img.classList.remove('hide'); $('face-placeholder').classList.add('hide') };
      r.readAsDataURL(f)
    }

    function latLngToUtm(lat, lng) {
      const a = 6378137, f = 1 / 298.257223563, k0 = 0.9996;
      const zone = Math.floor((lng + 180) / 6) + 1;
      const cm = (zone - 1) * 6 - 180 + 3;
      const latRad = lat * Math.PI / 180, cmRad = cm * Math.PI / 180;
      const e = Math.sqrt(2 * f - f * f), n = f / (2 - f), n2 = n * n, n3 = n2 * n;
      const sinLat = Math.sin(latRad), cosLat = Math.cos(latRad), tanLat = Math.sin(latRad) / Math.cos(latRad);
      const t = tanLat * tanLat, c = e * e * cosLat * cosLat / (1 - e * e);
      const A = cosLat * (lng - cm) * Math.PI / 180;
      const M = a * ((1 - e * e / 4 - 3 * e * e * e * e / 64 - 5 * e * e * e * e * e * e / 256) * latRad
        - (3 * e * e / 8 + 3 * e * e * e * e / 32 + 45 * e * e * e * e * e * e / 1024) * Math.sin(2 * latRad)
        + (15 * e * e * e * e / 256 + 45 * e * e * e * e * e * e / 1024) * Math.sin(4 * latRad)
        - (35 * e * e * e * e * e * e / 3072) * Math.sin(6 * latRad));
      const easting = k0 * A * (1 + A * A * ((1 - t + c) / 6 + A * A * (5 - 18 * t + t * t + 72 * c - 58 * e * e) / 120)) + 500000;
      const northing = k0 * (M + a * Math.pow(cosLat, 2) * tanLat * (A * A / 2 + A * A * A * A * (5 - t + 9 * c + 4 * c * c) / 120));
      return { este: Math.round(easting * 100) / 100, norte: Math.round(northing * 100) / 100, zona: zone }
    }

    function getGPS() {
      if (!navigator.geolocation) { toast('GPS no disponible'); return }
      $('reg-ubicacion').placeholder = 'Obteniendo ubicación...';
      navigator.geolocation.getCurrentPosition(
        p => {
          const u = latLngToUtm(p.coords.latitude, p.coords.longitude);
          $('reg-utmeste').value = u.este;
          $('reg-utmnorte').value = u.norte;
          $('reg-zona').value = u.zona;
          $('reg-hemisferio').value = p.coords.latitude >= 0 ? 'N' : 'S';
          $('reg-ubicacion').placeholder = 'Ubicación actual';
          toast('UTM: ' + u.zona + ' ' + u.este + ' ' + u.norte)
        },
        e => { toast('Error GPS: ' + e.message); $('reg-ubicacion').placeholder = 'Ingrese ubicación manualmente' },
        { enableHighAccuracy: true, timeout: 10000 }
      )
    }

    async function registrar() {
      const campos = ['cedula', 'nombre', 'apellido', 'salud', 'ubicacion', 'utmeste', 'utmnorte', 'zona', 'hemisferio', 'obs', 'por'];
      const v = {};
      campos.forEach(c => { v[c] = $('reg-' + c)?.value?.trim() || '' });
      const fecnac = $('reg-fecnac').value;
      if (!v.nombre || !v.apellido) { toast('Nombre y apellido son obligatorios'); return }

      const fd = new FormData();
      fd.append('cedula', v.cedula);
      fd.append('nombre', v.nombre);
      fd.append('apellido', v.apellido);
      if (fecnac) fd.append('fecha_nacimiento', fecnac);
      fd.append('estado_salud', v.salud);
      fd.append('ubicacion_actual', v.ubicacion);
      if (v.utmeste) fd.append('utm_este', v.utmeste);
      if (v.utmnorte) fd.append('utm_norte', v.utmnorte);
      if (v.zona) fd.append('zona_utm', v.zona);
      if (v.hemisferio) fd.append('hemisferio', v.hemisferio);
      fd.append('observaciones_medicas', v.obs);
      fd.append('registrado_por', v.por);
      if (fotoFile) fd.append('foto', fotoFile);

      try {
        await api('POST', '/ciudadanos/', fd);
        toast('Registrado correctamente');
        fotoFile = null; $('camera-preview').classList.add('hide'); $('camera-placeholder').classList.remove('hide'); $('foto-input').value = '';
        campos.forEach(c => { const el = $('reg-' + c); if (el) el.value = '' }); $('reg-fecnac').value = '';
        showPage('home')
      } catch (e) { toast('Error: ' + e.message) }
    }

    async function buscarCedula() {
      const ced = $('search-cedula').value.trim();
      if (!ced) { toast('Ingrese una cédula'); return }
      try {
        const r = await api('GET', '/busqueda/cedula/' + encodeURIComponent(ced));
        mostrarDetalle(r)
      } catch (e) { toast('No encontrado'); $('search-results').classList.add('hide') }
    }

    async function buscarFacial() {
      if (!faceFile) { toast('Seleccione una foto primero'); return }
      const fd = new FormData(); fd.append('foto', faceFile);
      try {
        const r = await api('POST', '/busqueda/facial?limite=20&umbral=0.3', fd);
        $('search-results').classList.remove('hide');
        const list = $('results-list');
        if (!r || r.length === 0) { list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray)">No se encontraron coincidencias</div>'; return }
        list.innerHTML = r.map(p => `<div class="result-item" onclick="mostrarDetalle({id:'${p.id}'})">
      <div style="display:flex;gap:12px;align-items:center">
        <div style="flex:1"><div class="result-name">${p.nombre || ''} ${p.apellido || ''}</div><div class="result-cedula">${p.cedula || ''}</div></div>
        <div><div class="similarity">${(p.similitud * 100).toFixed(1)}%</div><div class="result-status status-${p.estado_salud || 'estable'}">${p.estado_salud || 'N/A'}</div></div>
      </div>
    </div>`).join('')
      } catch (e) { toast('Error: ' + e.message) }
    }

    async function mostrarDetalle(p) {
      try {
        const r = p.id ? await api('GET', '/ciudadanos/' + p.id) : p;
        $('detail-content').innerHTML = `
      <div class="card">
        ${r.url_foto ? `<img src="/${r.url_foto}" style="width:100%;max-height:300px;object-fit:cover;border-radius:8px;margin-bottom:12px">` : ''}
        <div class="detail-row"><div class="detail-label">Cédula</div><div class="detail-value">${r.cedula || 'N/A'}</div></div>
        <div class="detail-row"><div class="detail-label">Nombre</div><div class="detail-value">${r.nombre || ''} ${r.apellido || ''}</div></div>
        <div class="detail-row"><div class="detail-label">Nacimiento</div><div class="detail-value">${r.fecha_nacimiento || 'N/A'}</div></div>
        <div class="detail-row"><div class="detail-label">Salud</div><div class="detail-value"><span class="result-status status-${r.estado_salud || 'estable'}">${r.estado_salud || 'N/A'}</span></div></div>
        <div class="detail-row"><div class="detail-label">Ubicación</div><div class="detail-value">${r.ubicacion_actual || 'N/A'}</div></div>
        ${r.utm_este ? `<div class="detail-row"><div class="detail-label">UTM</div><div class="detail-value">${r.zona_utm || '?'} ${r.hemisferio || ''} ${r.utm_este}E ${r.utm_norte}N</div></div>` : ''}
        ${r.observaciones_medicas ? `<div class="detail-row"><div class="detail-label">Observaciones</div><div class="detail-value">${r.observaciones_medicas}</div></div>` : ''}
        <div class="detail-row"><div class="detail-label">Registrado por</div><div class="detail-value">${r.registrado_por || 'N/A'}</div></div>
        <div class="detail-row"><div class="detail-label">Registrado</div><div class="detail-value">${new Date(r.creado_at).toLocaleString()}</div></div>
      </div>`;
        showPage('detail')
      } catch (e) { toast('Error: ' + e.message) }
    }

    function volver() {
      const prev = lastView.length > 1 ? lastView[lastView.length - 2] : 'home';
      showPage(prev)
    }

    async function cargarHome() {
      try {
        const r = await api('GET', '/ciudadanos/?limit=5');
        $('stat-total').textContent = r.length || 0;
        const hoy = new Date().toISOString().slice(0, 10);
        const hoyCount = r.filter(p => p.creado_at && p.creado_at.slice(0, 10) === hoy).length;
        $('stat-hoy').textContent = hoyCount;
        if (r.length === 0) { $('recent-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray)">No hay registros aún</div>'; return }
        $('recent-list').innerHTML = r.map(p => `<div class="result-item" onclick="mostrarDetalle({id:'${p.id}'})">
      <div class="result-name">${p.nombre || '?'} ${p.apellido || ''}</div>
      <div class="result-cedula">${p.cedula || 'Sin cédula'} · ${p.ubicacion_actual ? p.ubicacion_actual.slice(0, 30) : 'N/A'}</div>
    </div>`).join('')
      } catch (e) { $('recent-list').innerHTML = '<div style="text-align:center;padding:20px;color:var(--red)">Error al conectar</div>' }
    }

    cargarHome()
  </script>
</body>

</html>
