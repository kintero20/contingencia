<!DOCTYPE html>
<html lang="es">

<head>
  <meta name="Elaborado por Harold Quintero">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>SBEUP</title>
</head>

<body>

  <div class="header">
    <div>
      <h1>SBEUP</h1>
      <div class="sub">Sistema Biométrico de Emergencia</div>
    </div>
  </div>

  <div id="page-home" class="page">
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">-</div>
        <div class="stat-label">Registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-hoy">-</div>
        <div class="stat-label">Hoy</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Últimos registros</div>
      <div id="recent-list">
        <div class="loading">
          <div class="spinner"></div>
          <div>Cargando...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="page-register" class="page hide">
    <div class="card">
      <div class="card-title">Datos personales</div>
      <label>Cédula</label>
      <input id="reg-cedula" placeholder="V12345678">
      <label>Nombre</label>
      <input id="reg-nombre" placeholder="Nombre">
      <label>Apellido</label>
      <input id="reg-apellido" placeholder="Apellido">
      <label>Fecha de nacimiento</label>
      <input id="reg-fecnac" type="date">
    </div>
    <div class="card">
      <div class="card-title">Foto</div>
      <div class="camera-box" id="camera-box" onclick="document.getElementById('foto-input').click()">
        <div class="placeholder" id="camera-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <div>Tocar para tomar foto</div>
        </div>
        <img id="camera-preview" class="hide" style="width:100%;height:100%;object-fit:cover">
      </div>
      <input id="foto-input" type="file" accept="image/*" capture="environment" class="hide"
        onchange="previewFoto(event)">
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('foto-input').click()"
        style="margin-top:8px;width:auto">Elegir foto</button>
    </div>
    <div class="card">
      <div class="card-title">Situación</div>
      <label>Estado de salud</label>
      <select id="reg-salud">
        <option value="">Seleccionar...</option>
        <option value="estable">Estable</option>
        <option value="lesionado">Lesionado</option>
        <option value="critico">Crítico</option>
        <option value="fallecido">Fallecido</option>
      </select>
      <label>Ubicación actual</label>
      <div style="display:flex;gap:8px">
        <input id="reg-ubicacion" placeholder="Ej: Refugio Los Chorros" style="flex:1">
        <button class="btn btn-outline btn-sm btn-icon" onclick="getGPS()" title="GPS a UTM">📍</button>
      </div>
      <label>UTM Este (X)</label>
      <input id="reg-utmeste" type="number" step="any" placeholder="Ej: 289540">
      <label>UTM Norte (Y)</label>
      <input id="reg-utmnorte" type="number" step="any" placeholder="Ej: 1162000">
      <label>Zona UTM</label>
      <select id="reg-zona">
        <option value="">Seleccionar...</option>
        <option value="18">18</option>
        <option value="19">19 (Caracas)</option>
        <option value="20">20 (Oriente)</option>
        <option value="21">21</option>
      </select>
      <label>Hemisferio</label>
      <select id="reg-hemisferio">
        <option value="">Seleccionar...</option>
        <option value="N">Norte</option>
        <option value="S">Sur</option>
      </select>
      <label>Observaciones médicas</label>
      <textarea id="reg-obs" placeholder="Alergias, condiciones preexistentes, etc."></textarea>
      <label>Registrado por</label>
      <input id="reg-por" placeholder="Cédula o código del brigadista">
    </div>
    <button class="btn btn-primary" onclick="registrar()">Registrar persona</button>
  </div>

  <div id="page-search" class="page hide">
    <div class="card">
      <div class="card-title">Buscar por cédula</div>
      <div style="display:flex;gap:8px">
        <input id="search-cedula" placeholder="V12345678" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="buscarCedula()" style="width:auto">Buscar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Buscar por foto (reconocimiento facial)</div>
      <div class="camera-box" onclick="document.getElementById('face-input').click()" style="height:160px">
        <div id="face-placeholder" class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
            <circle cx="12" cy="13" r="4" />
          </svg>
          <div>Foto para búsqueda facial</div>
        </div>
        <img id="face-preview" class="hide" style="width:100%;height:100%;object-fit:cover">
      </div>
      <input id="face-input" type="file" accept="image/*" capture="environment" class="hide"
        onchange="previewFace(event)">
      <button class="btn btn-primary" onclick="buscarFacial()" style="margin-top:8px">Buscar por rostro</button>
    </div>
    <div id="search-results" class="hide">
      <div class="card">
        <div class="card-title">Resultados</div>
        <div id="results-list"></div>
      </div>
    </div>
  </div>

  <div id="page-detail" class="page hide">
    <button class="btn btn-outline btn-sm" onclick="volver()" style="width:auto;margin-bottom:12px">← Volver</button>
    <div id="detail-content"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      <span>Inicio</span>
    </button>
    <button class="nav-item" data-page="register" onclick="showPage('register')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <span>Registrar</span>
    </button>
    <button class="nav-item" data-page="search" onclick="showPage('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <span>Buscar</span>
    </button>
  </nav>

  <script src="/static/js/app.js"></script>
</body>

</html>
